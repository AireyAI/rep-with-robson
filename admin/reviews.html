<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>Review Moderation · REP with Robson Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../dist/styles.css" />
<style>
  body { background:#0A0A0A; color:#EDEDED; font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; line-height:1.6; }
  h1, h2, h3 { font-family:'Bebas Neue', Impact, sans-serif; letter-spacing:0.01em; line-height:0.95; }
  .btn { display:inline-flex; align-items:center; gap:0.5rem; padding:10px 18px; border-radius:999px; font-weight:600; font-size:13px; cursor:pointer; border:1.5px solid #262626; background:transparent; color:#EDEDED; transition:all 180ms ease; }
  .btn:hover { border-color:#EC0A7E; }
  .btn-pink { background:#EC0A7E; border-color:#EC0A7E; color:#fff; }
  .btn-pink:hover { background:#ff2fa0; border-color:#ff2fa0; }
  .btn-success { background:#2ECC71; border-color:#2ECC71; color:#0A0A0A; }
  .btn-success:hover { background:#3FD882; border-color:#3FD882; }
  .btn-danger { background:transparent; border-color:#E53935; color:#E53935; }
  .btn-danger:hover { background:#E53935; color:#fff; }
  .field { width:100%; background:#1A1A1A; color:#EDEDED; border:1px solid #262626; border-radius:10px; padding:12px 14px; font-family:'Inter',sans-serif; font-size:14px; }
  .field:focus { outline:none; border-color:#EC0A7E; }
  .card { background:#141414; border:1px solid #262626; border-radius:16px; padding:24px; }
  .badge { font-family:'JetBrains Mono',monospace; font-size:10px; text-transform:uppercase; letter-spacing:0.15em; padding:4px 10px; border-radius:999px; border:1px solid #262626; color:#9A9A9E; }
  .badge.pending { background:rgba(236,10,126,0.1); border-color:#EC0A7E; color:#EC0A7E; }
  .badge.approved { background:rgba(46,204,113,0.1); border-color:#2ECC71; color:#2ECC71; }
  .badge.rejected { background:rgba(229,57,53,0.1); border-color:#E53935; color:#E53935; }
  .tab { padding:10px 18px; border-radius:999px; font-size:13px; font-weight:600; cursor:pointer; background:#141414; border:1px solid #262626; color:#EDEDED; transition:all 180ms ease; }
  .tab:hover { border-color:#EC0A7E; }
  .tab.active { background:#EC0A7E; border-color:#EC0A7E; color:#fff; }
</style>
</head>
<body>

<!-- LOGIN GATE -->
<div id="gate" class="min-h-screen flex items-center justify-center p-6">
  <form onsubmit="return unlock(event)" class="card w-full max-w-md">
    <div class="flex items-center gap-3 mb-6">
      <img src="../brand_assets/logo.jpeg" class="w-12 h-12 rounded-full object-cover border border-edge" alt="" />
      <div>
        <div class="font-display text-xl uppercase tracking-wider">REP <span class="text-pink">/</span> Robson</div>
        <div class="font-mono text-[10px] uppercase tracking-widest text-mute">Admin · Review Moderation</div>
      </div>
    </div>
    <label class="block text-xs uppercase tracking-widest text-mute mb-2 font-bold" for="pw">Admin password</label>
    <input id="pw" type="password" class="field mb-5" autocomplete="current-password" placeholder="••••••••" autofocus />
    <div id="gateErr" class="hidden text-sm text-[#E53935] mb-4"></div>
    <button class="btn btn-pink w-full justify-center">Unlock
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14m-6-6l6 6-6 6"/></svg>
    </button>
    <p class="mt-5 text-[11px] text-mute font-mono uppercase tracking-widest">Default: <span class="text-pink">aria-admin</span></p>
  </form>
</div>

<!-- DASHBOARD -->
<div id="dash" class="hidden">

  <!-- Header -->
  <header class="border-b border-edge px-6 md:px-10 py-5 flex items-center justify-between sticky top-0 bg-ink/95 backdrop-blur z-20">
    <div class="flex items-center gap-3">
      <img src="../brand_assets/logo.jpeg" class="w-10 h-10 rounded-full object-cover border border-edge" alt="" />
      <div>
        <h1 class="text-xl uppercase tracking-wider">REP <span class="text-pink">/</span> Robson</h1>
        <div class="font-mono text-[10px] uppercase tracking-widest text-mute">Review Moderation</div>
      </div>
    </div>
    <div class="flex items-center gap-3">
      <a href="../reviews.html" target="_blank" class="btn">View public page
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M7 7h10v10M7 17L17 7"/></svg>
      </a>
      <button onclick="logout()" class="btn">Sign out</button>
    </div>
  </header>

  <!-- Status bar -->
  <div id="statusBar" class="px-6 md:px-10 py-3 bg-carbon border-b border-edge text-sm flex items-center gap-3">
    <span id="statusDot" class="w-2 h-2 rounded-full bg-mute"></span>
    <span id="statusText" class="text-mute font-mono uppercase tracking-widest text-[11px]">Checking Aria connection…</span>
    <button onclick="loadAll()" class="ml-auto text-pink text-xs font-mono uppercase tracking-widest hover:underline">Refresh</button>
  </div>

  <div class="max-w-[1440px] mx-auto px-6 md:px-10 py-10">

    <!-- Stats row -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
      <div class="card">
        <div class="text-xs uppercase tracking-widest text-mute font-mono mb-2">Pending</div>
        <div class="font-display text-5xl text-pink leading-none" id="statPending">0</div>
      </div>
      <div class="card">
        <div class="text-xs uppercase tracking-widest text-mute font-mono mb-2">Approved</div>
        <div class="font-display text-5xl text-[#2ECC71] leading-none" id="statApproved">0</div>
      </div>
      <div class="card">
        <div class="text-xs uppercase tracking-widest text-mute font-mono mb-2">Rejected</div>
        <div class="font-display text-5xl text-[#E53935] leading-none" id="statRejected">0</div>
      </div>
      <div class="card">
        <div class="text-xs uppercase tracking-widest text-mute font-mono mb-2">Total Public</div>
        <div class="font-display text-5xl leading-none" id="statTotal">130</div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="flex flex-wrap gap-2 mb-6" role="tablist">
      <button class="tab active" data-tab="pending">Pending <span class="opacity-70" id="tabPendingCount">0</span></button>
      <button class="tab" data-tab="approved">Approved <span class="opacity-70" id="tabApprovedCount">0</span></button>
      <button class="tab" data-tab="rejected">Rejected <span class="opacity-70" id="tabRejectedCount">0</span></button>
    </div>

    <!-- Empty state -->
    <div id="emptyState" class="hidden card text-center py-16">
      <div class="font-display text-4xl uppercase text-pink mb-3">All caught up.</div>
      <p class="text-mute">No reviews in this queue.</p>
    </div>

    <!-- Reviews list -->
    <div id="reviewsList" class="space-y-4"></div>

  </div>

  <!-- Footer -->
  <footer class="border-t border-edge px-6 md:px-10 py-5 text-xs font-mono uppercase tracking-widest text-mute">
    <div class="max-w-[1440px] mx-auto flex flex-col md:flex-row justify-between gap-2">
      <div>© <span id="year"></span> REP with Robson · Admin</div>
      <div>Endpoint: <span class="text-pink break-all" id="endpointDisplay"></span></div>
    </div>
  </footer>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const ADMIN_PASSWORD = 'aria-admin';                     // Change before going live
const SESSION_KEY = 'rwr_admin_session';
const ARIA_ENDPOINT = 'https://aria-chatbot-production-12d0.up.railway.app/api/reviews/repwithrobson';
document.getElementById('endpointDisplay').textContent = ARIA_ENDPOINT;
document.getElementById('year').textContent = new Date().getFullYear();

// ============================================================
// LOGIN
// ============================================================
function unlock(e) {
  e.preventDefault();
  const pw = document.getElementById('pw').value;
  const err = document.getElementById('gateErr');
  if (pw === ADMIN_PASSWORD) {
    sessionStorage.setItem(SESSION_KEY, '1');
    showDash();
  } else {
    err.textContent = 'Wrong password. Try again.';
    err.classList.remove('hidden');
  }
  return false;
}
function logout() { sessionStorage.removeItem(SESSION_KEY); location.reload(); }
function showDash() {
  document.getElementById('gate').classList.add('hidden');
  document.getElementById('dash').classList.remove('hidden');
  loadAll();
}
if (sessionStorage.getItem(SESSION_KEY) === '1') showDash();

// ============================================================
// DATA
// ============================================================
let state = { pending: [], approved: [], rejected: [], ariaOnline: false };
let activeTab = 'pending';

async function loadAll() {
  setStatus('loading', 'Fetching from Aria…');
  try {
    const res = await fetch(ARIA_ENDPOINT + '?all=1', {
      headers: { 'X-Admin-Password': ADMIN_PASSWORD }
    });
    if (!res.ok) throw new Error('bad status');
    const data = await res.json();
    state.pending  = (data.reviews || []).filter(r => !r.approved && !r.rejected);
    state.approved = (data.reviews || []).filter(r =>  r.approved);
    state.rejected = (data.reviews || []).filter(r =>  r.rejected);
    state.ariaOnline = true;
    setStatus('ok', `Aria online · ${(data.reviews || []).length} records`);
  } catch (e) {
    // Fallback: show anything stored locally
    state.pending = JSON.parse(localStorage.getItem('pending_reviews') || '[]');
    state.approved = [];
    state.rejected = [];
    state.ariaOnline = false;
    setStatus('err', 'Aria offline — showing local cache only');
  }
  paint();
}

function setStatus(kind, txt) {
  const colors = { loading:'bg-mute', ok:'bg-[#2ECC71]', err:'bg-[#E53935]' };
  document.getElementById('statusDot').className = 'w-2 h-2 rounded-full ' + (colors[kind] || 'bg-mute');
  document.getElementById('statusText').textContent = txt;
}

function paint() {
  document.getElementById('statPending').textContent  = state.pending.length;
  document.getElementById('statApproved').textContent = state.approved.length;
  document.getElementById('statRejected').textContent = state.rejected.length;
  document.getElementById('statTotal').textContent    = 130 + state.approved.length;
  document.getElementById('tabPendingCount').textContent  = `(${state.pending.length})`;
  document.getElementById('tabApprovedCount').textContent = `(${state.approved.length})`;
  document.getElementById('tabRejectedCount').textContent = `(${state.rejected.length})`;
  renderList();
}

// ============================================================
// LIST RENDER
// ============================================================
function stars(n) {
  let out = '';
  for (let i = 0; i < (n || 5); i++) {
    out += '<svg width="14" height="14" viewBox="0 0 24 24" fill="#EC0A7E"><path d="M12 2l2.9 6.9L22 10l-5 4.8L18.2 22 12 18.3 5.8 22 7 14.8 2 10l7.1-1.1z"/></svg>';
  }
  return out;
}

function escapeHtml(s) { return String(s || '').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function renderList() {
  const list = state[activeTab] || [];
  const el = document.getElementById('reviewsList');
  const empty = document.getElementById('emptyState');
  if (!list.length) { el.innerHTML = ''; empty.classList.remove('hidden'); return; }
  empty.classList.add('hidden');
  el.innerHTML = list.map((r, i) => `
    <article class="card" data-id="${escapeHtml(r.id || i)}">
      <div class="flex items-start justify-between gap-4 mb-4 flex-wrap">
        <div>
          <div class="flex items-center gap-3 mb-2">
            <div class="w-10 h-10 rounded-full bg-pink/20 border border-pink flex items-center justify-center font-display text-lg">${escapeHtml((r.name || '?')[0]).toUpperCase()}</div>
            <div>
              <div class="font-semibold">${escapeHtml(r.name || 'Anonymous')}</div>
              <div class="font-mono text-[10px] uppercase tracking-widest text-mute">${escapeHtml(r.email || '—')}</div>
            </div>
          </div>
          <div class="flex gap-1">${stars(r.rating)}</div>
        </div>
        <div class="flex gap-2 flex-wrap items-start">
          <span class="badge ${activeTab}">${activeTab}</span>
          ${r.service ? `<span class="badge">${escapeHtml(r.service)}</span>` : ''}
          <span class="badge">${escapeHtml(r.date || r.submittedAt || 'Just now')}</span>
        </div>
      </div>
      <p class="text-bone/90 leading-relaxed mb-5">${escapeHtml(r.text || '')}</p>
      <div class="flex gap-2 flex-wrap pt-4 border-t border-edge">
        ${activeTab === 'pending' ? `
          <button onclick="approve('${escapeHtml(r.id || i)}')" class="btn btn-success">✓ Approve</button>
          <button onclick="reject('${escapeHtml(r.id || i)}')" class="btn btn-danger">✕ Reject</button>
        ` : activeTab === 'approved' ? `
          <button onclick="reject('${escapeHtml(r.id || i)}')" class="btn btn-danger">Unpublish</button>
        ` : `
          <button onclick="approve('${escapeHtml(r.id || i)}')" class="btn btn-success">Restore</button>
        `}
      </div>
    </article>
  `).join('');
}

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    activeTab = tab.dataset.tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t === tab));
    renderList();
  });
});

// ============================================================
// ACTIONS
// ============================================================
async function postAction(id, action) {
  if (!state.ariaOnline) {
    alert('Aria is offline — cannot ' + action + '. Wire up the Aria endpoint first.');
    return;
  }
  try {
    const res = await fetch(ARIA_ENDPOINT + '/' + encodeURIComponent(id), {
      method: 'PATCH',
      headers: {
        'Content-Type': 'application/json',
        'X-Admin-Password': ADMIN_PASSWORD
      },
      body: JSON.stringify({ action })
    });
    if (!res.ok) throw new Error('bad status');
    await loadAll();
  } catch (e) {
    alert('Action failed — please try again.');
  }
}
function approve(id) { postAction(id, 'approve'); }
function reject(id)  { postAction(id, 'reject'); }
</script>
</body>
</html>
