<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>REP with Robson — Recover · Evolve · Perform</title>
<meta name="description" content="REP with Robson — Sports massage, coaching and recovery with Jord Robson in Carlisle." />
<meta name="theme-color" content="#000000" />
<meta name="robots" content="index, follow" />
<link rel="canonical" href="https://repwithrobson.co.uk/" />

<meta property="og:type" content="website" />
<meta property="og:title" content="REP with Robson | Recover · Evolve · Perform" />
<meta property="og:description" content="Sports massage, injury treatment and performance coaching with Jord Robson in Carlisle." />
<meta property="og:image" content="video/hero-shoulder-poster.jpg" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />

<style>
  :root {
    --ink: #000;
    --bone: #EDEDED;
    --pink: #EC0A7E;
    --mute: #9A9A9E;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #000; color: var(--bone); overflow: hidden; font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }

  .stage {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; background: #000;
  }

  .intro-video {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    filter: saturate(1.08) contrast(1.05);
  }

  /* Dark vignette for text legibility */
  .vignette {
    position: absolute; inset: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.45) 70%, rgba(0,0,0,0.85) 100%),
      linear-gradient(180deg, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0.60) 100%);
  }

  /* Word overlays */
  .word {
    position: absolute;
    font-family: 'Bebas Neue', Impact, sans-serif;
    font-size: clamp(5rem, 16vw, 14rem);
    line-height: 0.85;
    text-transform: uppercase;
    letter-spacing: 0.005em;
    color: var(--bone);
    opacity: 0;
    text-shadow: 0 8px 40px rgba(0,0,0,0.65);
    will-change: opacity, transform;
    white-space: nowrap;
  }
  .word .dot { color: var(--pink); }

  .w-recover  { top: 12%; left: 6%; }
  .w-evolve   { top: 50%; right: 6%; transform: translateY(-50%); color: transparent; -webkit-text-stroke: 2px var(--bone); }
  .w-perform  { bottom: 10%; left: 6%; color: var(--pink); text-shadow: 0 0 40px rgba(236,10,126,0.5); }

  @media (max-width: 768px) {
    .word { font-size: clamp(4rem, 20vw, 7rem); }
    .w-recover  { top: 9%; left: 6%; }
    .w-evolve   { top: 50%; left: 6%; right: auto; transform: translateY(-50%); }
    .w-perform  { bottom: 12%; left: 6%; }
  }

  /* LOGO REVEAL — starts hidden, shows at end */
  .logo-reveal {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 14px;
    opacity: 0; pointer-events: none;
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(3px);
    z-index: 3;
  }
  .logo-reveal img {
    width: clamp(160px, 28vw, 360px); height: auto;
    display: block;
    filter: drop-shadow(0 0 30px rgba(236,10,126,0.35));
  }
  .logo-reveal .tagline {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(11px, 1.2vw, 14px);
    text-transform: uppercase;
    letter-spacing: 0.35em;
    color: var(--bone);
    opacity: 0.85;
  }
  .logo-reveal .tagline .sep { color: var(--pink); margin: 0 0.4em; }
  .logo-reveal .enter-cta {
    margin-top: 12px;
    display: inline-flex; align-items: center; gap: 10px;
    padding: 14px 30px; border-radius: 999px;
    background: var(--pink); color: #fff;
    font-family: 'Inter', sans-serif; font-weight: 700; font-size: 14px;
    letter-spacing: 0.06em; text-transform: uppercase;
    border: none; cursor: pointer; text-decoration: none;
    box-shadow: 0 10px 40px rgba(236,10,126,0.4);
    animation: pulse-soft 2.4s ease-in-out infinite;
  }
  @keyframes pulse-soft {
    0%, 100% { transform: translateY(0); box-shadow: 0 10px 40px rgba(236,10,126,0.4); }
    50%      { transform: translateY(-2px); box-shadow: 0 14px 50px rgba(236,10,126,0.6); }
  }

  /* Skip button */
  .skip-btn {
    position: fixed; top: 20px; right: 20px; z-index: 10;
    padding: 9px 16px; border-radius: 999px;
    background: rgba(0,0,0,0.45);
    border: 1px solid rgba(255,255,255,0.2);
    color: var(--bone); font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; font-weight: 700;
    cursor: pointer; text-decoration: none;
    opacity: 0; transform: translateY(-6px);
    transition: all 300ms ease, border-color 200ms ease;
    backdrop-filter: blur(6px);
  }
  .skip-btn:hover { border-color: var(--pink); color: var(--pink); }
  .skip-btn.show { opacity: 1; transform: translateY(0); }
  .skip-btn svg { margin-left: 6px; vertical-align: -2px; }

  /* Progress bar */
  .progress {
    position: fixed; bottom: 0; left: 0; right: 0; height: 3px;
    background: rgba(255,255,255,0.05);
    z-index: 10;
  }
  .progress-fill {
    height: 100%; width: 0%;
    background: var(--pink);
    box-shadow: 0 0 12px var(--pink);
    transition: width 100ms linear;
  }

  /* Text animation helpers */
  .fade-in { animation: fade-in-up 700ms cubic-bezier(.2,.9,.3,1.2) forwards; }
  .fade-out { animation: fade-out 500ms ease forwards; }
  @keyframes fade-in-up {
    from { opacity: 0; transform: translateY(40px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @media (max-width: 768px) {
    .w-evolve.fade-in, .w-perform.fade-in, .w-recover.fade-in { /* override transform for centered mobile */ }
  }
  @keyframes fade-out { to { opacity: 0; } }
  .visible-end { animation: logo-fade-in 900ms cubic-bezier(.2,.9,.3,1.2) forwards; }
  @keyframes logo-fade-in {
    from { opacity: 0; transform: scale(0.95); }
    to   { opacity: 1; transform: scale(1); }
  }

  /* Audio off indicator */
  .audio-note {
    position: fixed; bottom: 14px; left: 14px; z-index: 10;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--mute); opacity: 0;
    transition: opacity 400ms ease;
    pointer-events: none;
  }
  .audio-note.show { opacity: 0.7; }

  /* Reduced motion — skip straight to logo */
  @media (prefers-reduced-motion: reduce) {
    .intro-video { display: none; }
    .word { display: none; }
    .logo-reveal { opacity: 1 !important; pointer-events: auto !important; }
  }
</style>
</head>
<body>

<main class="stage" aria-label="REP with Robson intro">
  <video
    id="introVideo"
    class="intro-video"
    src="video/intro-manifesto.mp4"
    poster="video/hero-shoulder-poster.jpg"
    autoplay muted playsinline preload="auto"></video>

  <div class="vignette"></div>

  <!-- Word overlays -->
  <div class="word w-recover" id="wRecover">Recover<span class="dot">.</span></div>
  <div class="word w-evolve"  id="wEvolve">Evolve<span class="dot">.</span></div>
  <div class="word w-perform" id="wPerform">Perform<span class="dot">.</span></div>

  <!-- Logo reveal at end -->
  <div class="logo-reveal" id="logoReveal">
    <img src="brand_assets/logo.jpeg" alt="REP with Robson logo" />
    <div class="tagline">Recover <span class="sep">·</span> Evolve <span class="sep">·</span> Perform</div>
    <a href="index.html" class="enter-cta" id="enterBtn">
      Enter the Site
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14m-6-6l6 6-6 6"/></svg>
    </a>
  </div>

  <a href="index.html" class="skip-btn" id="skipBtn" aria-label="Skip intro">
    Skip
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14m-6-6l6 6-6 6"/></svg>
  </a>

  <div class="progress" aria-hidden="true"><div class="progress-fill" id="progressFill"></div></div>
  <div class="audio-note" id="audioNote">Silent · visuals only</div>
</main>

<script>
  // Flag the device as having seen the intro, so future visits skip straight to homepage
  try { localStorage.setItem('rwr_intro_seen', '1'); } catch (e) {}

  const video = document.getElementById('introVideo');
  const wRecover = document.getElementById('wRecover');
  const wEvolve  = document.getElementById('wEvolve');
  const wPerform = document.getElementById('wPerform');
  const logoReveal = document.getElementById('logoReveal');
  const skipBtn   = document.getElementById('skipBtn');
  const progress  = document.getElementById('progressFill');
  const audioNote = document.getElementById('audioNote');

  // Beat timings (in seconds) — synced to the 8-sec video
  const BEATS = {
    recoverIn:  0.4,
    recoverOut: 2.8,
    evolveIn:   2.4,
    evolveOut:  5.2,
    performIn:  5.0,
    performOut: 7.8,
    logoIn:     7.5
  };

  let fired = { recoverIn:false, recoverOut:false, evolveIn:false, evolveOut:false, performIn:false, performOut:false, logoIn:false };

  function playBeat(t) {
    if (!fired.recoverIn && t >= BEATS.recoverIn) { fired.recoverIn = true; wRecover.classList.add('fade-in'); }
    if (!fired.recoverOut && t >= BEATS.recoverOut) { fired.recoverOut = true; wRecover.classList.add('fade-out'); }
    if (!fired.evolveIn && t >= BEATS.evolveIn) { fired.evolveIn = true; wEvolve.classList.add('fade-in'); }
    if (!fired.evolveOut && t >= BEATS.evolveOut) { fired.evolveOut = true; wEvolve.classList.add('fade-out'); }
    if (!fired.performIn && t >= BEATS.performIn) { fired.performIn = true; wPerform.classList.add('fade-in'); }
    if (!fired.performOut && t >= BEATS.performOut) { fired.performOut = true; wPerform.classList.add('fade-out'); }
    if (!fired.logoIn && t >= BEATS.logoIn) {
      fired.logoIn = true;
      logoReveal.classList.add('visible-end');
      logoReveal.style.pointerEvents = 'auto';
    }
  }

  video.addEventListener('timeupdate', () => {
    const t = video.currentTime;
    const d = video.duration || 8;
    playBeat(t);
    progress.style.width = Math.min(100, (t / d) * 100) + '%';
  });

  video.addEventListener('ended', () => {
    progress.style.width = '100%';
    // Ensure logo shows even if timeupdate missed it
    if (!fired.logoIn) {
      fired.logoIn = true;
      logoReveal.classList.add('visible-end');
      logoReveal.style.pointerEvents = 'auto';
    }
    // Auto-advance after a 2.5s pause on the logo
    setTimeout(() => { location.href = 'index.html'; }, 2500);
  });

  // Show skip button 1.5s in
  setTimeout(() => skipBtn.classList.add('show'), 1500);

  // Show 'silent' note briefly at start
  setTimeout(() => audioNote.classList.add('show'), 400);
  setTimeout(() => audioNote.classList.remove('show'), 3500);

  // Preload the homepage so the transition is instant
  const preload = document.createElement('link');
  preload.rel = 'prefetch'; preload.href = 'index.html';
  document.head.appendChild(preload);

  // Keyboard: Enter / Space / Escape all skip
  document.addEventListener('keydown', (e) => {
    if (['Enter', ' ', 'Escape'].includes(e.key)) location.href = 'index.html';
  });

  // If video fails to load, go straight to homepage after 2s
  video.addEventListener('error', () => setTimeout(() => { location.href = 'index.html'; }, 2000));

  // Safety: if video hasn't started after 3s (autoplay blocked), show logo + enter
  setTimeout(() => {
    if (video.paused && video.currentTime === 0) {
      logoReveal.classList.add('visible-end');
      logoReveal.style.pointerEvents = 'auto';
    }
  }, 3000);
</script>

</body>
</html>
